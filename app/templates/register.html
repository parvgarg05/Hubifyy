{% extends "base.html" %}

{% block title %}Register - Hubify{% endblock %}

{% block content %}
<div class="auth-container">
    <h2 style="text-align: center; margin-bottom: 1.5rem;">Create Account</h2>
    
    {% if error %}
    <div style="background: #fee2e2; color: #b91c1c; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem;">
        {{ error }}
    </div>
    {% endif %}

    <form action="/register" method="post">
        <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" name="full_name" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-input" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
    </form>
    
    <p style="text-align: center; margin-top: 1rem; color: var(--text-muted);">
        Already have an account? <a href="/login" style="color: var(--primary); font-weight: 600;">Login here</a>
    </p>
</div>
{% endblock %}
