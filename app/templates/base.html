<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hubify{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <a href="/" class="logo">
                <span>🎓</span> Hubify
            </a>

            <div class="nav-links">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Home</a>
                
                <a href="/clubs" class="nav-link {% if request.url.path.startswith('/clubs') %}active{% endif %}">Clubs</a>
                
                <a href="/events" class="nav-link {% if request.url.path.startswith('/events') %}active{% endif %}">Events</a>
                
                {% if user %}
                    {% if user.role == "admin" %}
                        <a href="/admin/dashboard" class="nav-link {% if request.url.path.startswith('/admin') %}active{% endif %}" style="color: var(--primary); font-weight: 700; border: 1px solid var(--primary); padding: 5px 10px; border-radius: 6px;">
                            Admin Panel
                        </a>
                    
                    {% else %}
                        <a href="/dashboard" class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}">Dashboard</a>
                    {% endif %}

                    <a href="/logout" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.9rem;">Logout</a>

                {% else %}
                    <a href="/login" class="nav-link {% if request.url.path == '/login' %}active{% endif %}">Login</a>
                    <a href="/register" class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.9rem;">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main style="flex: 1;">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Hubify. Built for Students.</p>
        </div>
    </footer>

</body>
</html>
